{% extends "base.html" %}

{% block title %}Reminders - Discord Pals{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Reminders</h1>
    <p class="page-subtitle">Browse and cancel durable in-character reminders.</p>
</div>

<div class="card">
    <div class="card-header">
        <span class="card-title">Filters</span>
    </div>
    <div class="card-body">
        <div class="settings-grid">
            <div class="form-group">
                <label for="reminder-bot-filter">Bot</label>
                <select id="reminder-bot-filter" title="Filter by bot">
                    <option value="">All bots</option>
                    {% for bot in bots %}
                    <option value="{{ bot.name }}">{{ bot.name }}{% if not bot.online %} (offline){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="reminder-user-filter">User ID</label>
                <input type="text" id="reminder-user-filter" placeholder="Optional user ID" title="Filter by user ID">
            </div>
            <div class="form-group">
                <label for="reminder-status-filter">Status</label>
                <select id="reminder-status-filter" title="Filter by status">
                    <option value="pending" selected>Pending</option>
                    <option value="">All statuses</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="skipped">Skipped</option>
                    <option value="failed">Failed</option>
                </select>
            </div>
        </div>
        <div class="button-row">
            <button type="button" class="btn btn-primary" onclick="loadReminders()">Refresh</button>
            <button type="button" class="btn btn-ghost" onclick="toggleSelectAll()">Select All Visible</button>
            <button type="button" class="btn btn-danger" onclick="cancelSelectedReminders()">Cancel Selected</button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <span class="card-title">Reminder Queue</span>
        <span class="text-muted" id="reminder-count">Loading…</span>
    </div>
    <div class="card-body">
        <div id="reminder-empty" class="empty" style="display:none;">No reminders match the current filters.</div>
        <div class="table-wrap" id="reminder-table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 40px;"></th>
                        <th>ID</th>
                        <th>Bot</th>
                        <th>User</th>
                        <th>Event</th>
                        <th>Due</th>
                        <th>Pre</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th>Mode</th>
                    </tr>
                </thead>
                <tbody id="reminder-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<style>
.page-header {
    margin-bottom: 32px;
}

.page-title {
    font-size: 1.875rem;
    font-weight: 600;
    letter-spacing: -0.025em;
    margin-bottom: 4px;
}

.page-subtitle {
    color: var(--text-muted);
    font-size: 0.875rem;
}

.settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: var(--text-secondary);
}

.button-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.table-wrap {
    overflow-x: auto;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table th,
.table td {
    text-align: left;
    padding: 12px 10px;
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: top;
}

.table th {
    color: var(--text-secondary);
    font-size: 0.8125rem;
    font-weight: 600;
}

.table td {
    font-size: 0.875rem;
}

.status-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
}

.status-badge.pending {
    background: var(--accent-muted);
    color: var(--accent);
}

.status-badge.completed {
    background: var(--success-muted);
    color: var(--success);
}

.status-badge.failed,
.status-badge.cancelled,
.status-badge.skipped {
    background: var(--danger-muted);
    color: var(--danger);
}

.text-muted {
    color: var(--text-muted);
}
</style>

<script>
let reminderRows = [];

function selectedReminderIds() {
    return Array.from(document.querySelectorAll('.reminder-checkbox:checked'))
        .map(input => input.value)
        .filter(Boolean);
}

function toggleSelectAll() {
    const checkboxes = Array.from(document.querySelectorAll('.reminder-checkbox'));
    if (!checkboxes.length) return;
    const shouldSelect = checkboxes.some(box => !box.checked);
    checkboxes.forEach(box => {
        box.checked = shouldSelect;
    });
}

function renderReminders(rows) {
    reminderRows = rows;
    const body = document.getElementById('reminder-table-body');
    const empty = document.getElementById('reminder-empty');
    const wrap = document.getElementById('reminder-table-wrap');
    const count = document.getElementById('reminder-count');

    count.textContent = `${rows.length} reminder${rows.length === 1 ? '' : 's'}`;

    if (!rows.length) {
        body.innerHTML = '';
        empty.style.display = 'block';
        wrap.style.display = 'none';
        return;
    }

    empty.style.display = 'none';
    wrap.style.display = 'block';
    body.innerHTML = rows.map(reminder => `
        <tr>
            <td><input class="reminder-checkbox" type="checkbox" value="${escapeHtml(reminder.id)}" title="Select reminder"></td>
            <td><code>${escapeHtml(reminder.id)}</code></td>
            <td>${escapeHtml(reminder.bot_name || '')}</td>
            <td>${escapeHtml(reminder.target_user_name || '')}<div class="text-muted">${escapeHtml(String(reminder.target_user_id || ''))}</div></td>
            <td>${escapeHtml(reminder.event_summary || '')}</td>
            <td>${escapeHtml(reminder.due_display || '')}</td>
            <td>${escapeHtml(reminder.pre_due_display || '—')}</td>
            <td><span class="status-badge ${escapeHtml(reminder.status || 'pending')}">${escapeHtml(reminder.status || 'pending')}</span></td>
            <td>${escapeHtml(reminder.source_channel_name || '')}<div class="text-muted">${escapeHtml(reminder.source_type || '')}</div></td>
            <td>${escapeHtml(reminder.creation_mode || '')}</td>
        </tr>
    `).join('');
}

function escapeHtml(value) {
    const div = document.createElement('div');
    div.textContent = value == null ? '' : String(value);
    return div.innerHTML;
}

async function loadReminders() {
    const params = new URLSearchParams();
    const botName = document.getElementById('reminder-bot-filter').value.trim();
    const userId = document.getElementById('reminder-user-filter').value.trim();
    const status = document.getElementById('reminder-status-filter').value.trim();

    if (botName) params.set('bot_name', botName);
    if (userId) params.set('user_id', userId);
    if (status) params.set('status', status);

    const response = await fetch(`/api/reminders?${params.toString()}`);
    const data = await response.json();

    if (response.ok && data.status === 'ok') {
        renderReminders(data.reminders || []);
    } else {
        renderReminders([]);
        showToast(data.message || 'Failed to load reminders', 'error');
    }
}

async function cancelSelectedReminders() {
    const ids = selectedReminderIds();
    if (!ids.length) {
        showToast('Select at least one reminder first', 'warning');
        return;
    }

    const response = await fetch('/api/reminders/cancel', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': '{{ csrf_token() }}'
        },
        body: JSON.stringify({ ids })
    });
    const data = await response.json();

    if (response.ok && data.status === 'ok') {
        showToast(`Cancelled ${data.cancelled} reminder${data.cancelled === 1 ? '' : 's'}`, 'success');
        loadReminders();
    } else {
        showToast(data.message || 'Failed to cancel reminders', 'error');
    }
}

document.getElementById('reminder-bot-filter').addEventListener('change', loadReminders);
document.getElementById('reminder-user-filter').addEventListener('change', loadReminders);
document.getElementById('reminder-status-filter').addEventListener('change', loadReminders);
document.addEventListener('DOMContentLoaded', loadReminders);
</script>
{% endblock %}
