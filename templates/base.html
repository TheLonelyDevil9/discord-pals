<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Discord Pals{% endblock %}</title>
    <meta name="color-scheme" content="dark light">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon-96x96.png') }}" sizes="96x96">
    <!-- The generated SVG favicon embeds a multi-megabyte raster payload; keep it off the critical path. -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <meta name="apple-mobile-web-app-title" content="Discord Pals">
    <link rel="manifest" href="{{ url_for('static', filename='site.webmanifest') }}">
    <style>
        /* ===== Design System: Clean Minimal ===== */

        /* Dark Theme (Default) */
        :root, [data-theme="dark"] {
            color-scheme: dark;
            --bg-primary: oklch(17% 0.009 270);
            --bg-secondary: oklch(22% 0.011 270);
            --bg-tertiary: oklch(28% 0.012 270);
            --border: oklch(42% 0.014 270);
            --border-subtle: oklch(31% 0.012 270);
            --text-primary: oklch(96% 0.006 270);
            --text-secondary: oklch(73% 0.012 270);
            --text-muted: oklch(61% 0.011 270);
            --on-accent: oklch(98% 0.006 260);
            --on-warning: oklch(20% 0.012 85);
            --accent: oklch(62% 0.18 255);
            --accent-muted: color-mix(in oklch, var(--accent) 14%, transparent);
            --success: oklch(70% 0.17 150);
            --success-muted: color-mix(in oklch, var(--success) 14%, transparent);
            --warning: oklch(78% 0.16 85);
            --warning-muted: color-mix(in oklch, var(--warning) 16%, transparent);
            --danger: oklch(66% 0.2 25);
            --danger-muted: color-mix(in oklch, var(--danger) 14%, transparent);
            --scrim: color-mix(in oklch, var(--bg-primary) 72%, transparent);
            --row-hover: color-mix(in oklch, var(--bg-secondary) 72%, var(--text-primary) 4%);
            --shadow-color: oklch(8% 0.01 270 / 0.38);
        }

        /* Light Theme */
        [data-theme="light"] {
            color-scheme: light;
            --bg-primary: oklch(98% 0.006 270);
            --bg-secondary: oklch(95% 0.008 270);
            --bg-tertiary: oklch(91% 0.01 270);
            --border: oklch(80% 0.012 270);
            --border-subtle: oklch(88% 0.01 270);
            --text-primary: oklch(20% 0.012 270);
            --text-secondary: oklch(39% 0.014 270);
            --text-muted: oklch(51% 0.013 270);
            --on-accent: oklch(98% 0.006 260);
            --on-warning: oklch(20% 0.012 85);
            --accent: oklch(55% 0.18 255);
            --accent-muted: color-mix(in oklch, var(--accent) 12%, transparent);
            --success: oklch(58% 0.16 150);
            --success-muted: color-mix(in oklch, var(--success) 12%, transparent);
            --warning: oklch(62% 0.15 85);
            --warning-muted: color-mix(in oklch, var(--warning) 14%, transparent);
            --danger: oklch(56% 0.2 25);
            --danger-muted: color-mix(in oklch, var(--danger) 12%, transparent);
            --scrim: color-mix(in oklch, var(--bg-primary) 76%, var(--text-primary) 30%);
            --row-hover: color-mix(in oklch, var(--bg-secondary) 78%, var(--text-primary) 4%);
            --shadow-color: oklch(25% 0.012 270 / 0.18);
        }

        /* ===== Base Styles ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 0.875rem;
        }

        .hidden {
            display: none !important;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skip-link {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 3000;
            transform: translateY(-160%);
        }

        .skip-link:focus {
            transform: translateY(0);
        }

        /* Accessibility: Focus indicators */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* ===== Layout ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 1.875rem;
            font-weight: 600;
            letter-spacing: 0;
            margin-bottom: 4px;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            max-width: 72ch;
        }

        /* ===== Navigation ===== */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 64px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            text-decoration: none;
            position: relative;
        }

        .nav-brand-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
        }

        .nav-brand-text {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .nav-brand-text:hover {
            color: var(--accent);
        }

        .nav-version {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        .nav-update-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 40px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid color-mix(in oklch, var(--warning) 58%, var(--border));
            background: color-mix(in oklch, var(--warning) 16%, var(--bg-secondary));
            color: var(--warning);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            box-shadow: 0 0 0 1px color-mix(in oklch, var(--warning) 16%, transparent);
            transition: background-color 0.12s ease, border-color 0.12s ease, color 0.12s ease;
        }

        .nav-update-status:hover {
            background: color-mix(in oklch, var(--warning) 24%, var(--bg-secondary));
            color: var(--text-primary);
        }

        .nav-update-status.restart-required {
            border-color: color-mix(in oklch, var(--accent) 62%, var(--border));
            background: color-mix(in oklch, var(--accent) 18%, var(--bg-secondary));
            color: var(--accent);
            box-shadow: 0 0 0 1px color-mix(in oklch, var(--accent) 18%, transparent);
        }

        .nav-update-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 1.6s infinite;
            flex: 0 0 auto;
        }

        .update-btn-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-version-badge {
            font-size: 0.7rem;
            color: var(--on-accent);
            background: var(--success);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            animation: pulse-badge 2s infinite;
        }

        .new-version-badge.hidden {
            display: none;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Banner hover preview */
        .nav-brand-preview {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            width: 400px;
            max-width: 90vw;
            border-radius: 8px;
            box-shadow: 0 8px 32px var(--shadow-color);
            border: 1px solid var(--border);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: opacity 0.15s ease, visibility 0.15s ease, transform 0.15s ease;
            z-index: 200;
            pointer-events: none;
        }

        .nav-brand:hover .nav-brand-preview {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-link {
            padding: 8px 16px;
            border-radius: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: color 0.12s ease, background-color 0.12s ease;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .nav-link.active {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .nav-link[aria-current="page"] {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-user {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 6px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.12s ease, border-color 0.12s ease, background-color 0.12s ease;
            font-size: 1rem;
        }

        .theme-toggle:hover {
            color: var(--text-primary);
            border-color: var(--border);
        }

        /* ===== Cards ===== */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-body {
            padding: 24px;
        }

        .form-hint {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 6px;
            line-height: 1.5;
        }

        .advanced-panel {
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            background: var(--bg-primary);
        }

        .advanced-panel > summary {
            cursor: pointer;
            padding: 12px 14px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .advanced-panel[open] > summary {
            border-bottom: 1px solid var(--border-subtle);
        }

        .advanced-panel-body {
            padding: 14px;
        }

        /* Legacy card support */
        .card:not(:has(.card-header)):not(:has(.card-body)) {
            padding: 24px;
        }

        /* ===== Grid ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* ===== Stats ===== */
        .stat {
            text-align: center;
            padding: 24px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            margin-top: 8px;
            letter-spacing: -0.025em;
            color: var(--text-primary);
        }

        /* ===== Badges ===== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0;
        }

        .badge-success {
            background: var(--success-muted);
            color: var(--success);
        }

        .badge-warning {
            background: var(--warning-muted);
            color: var(--warning);
        }

        .badge-danger {
            background: var(--danger-muted);
            color: var(--danger);
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* ===== Tables ===== */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 24px;
            color: var(--text-muted);
            font-size: 0.6875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--bg-primary);
        }

        td {
            padding: 16px 24px;
            font-size: 0.875rem;
            border-top: 1px solid var(--border-subtle);
        }

        tr:hover td {
            background: var(--row-hover);
        }

        /* Responsive table wrapper */
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== Code ===== */
        pre, code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.8125rem;
        }

        code {
            background: var(--bg-tertiary);
            border-radius: 4px;
            padding: 2px 6px;
        }

        pre {
            background: var(--bg-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            max-height: 400px;
        }

        pre code {
            background: none;
            padding: 0;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.8125rem;
            border: none;
            cursor: pointer;
            transition: opacity 0.12s ease, color 0.12s ease, background-color 0.12s ease, border-color 0.12s ease;
            text-decoration: none;
            min-height: 40px;
            line-height: 1.2;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--on-accent);
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .btn-success {
            background: var(--success);
            color: var(--on-accent);
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: var(--danger);
            color: var(--on-accent);
        }

        .btn:disabled,
        .btn[aria-disabled="true"] {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-sm {
            min-height: 34px;
            padding: 6px 12px;
            font-size: 0.75rem;
        }

        /* ===== Forms ===== */
        input:not([type="checkbox"]):not([type="radio"]), select, textarea {
            font-family: inherit;
            font-size: 0.875rem;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color 0.15s ease;
            width: 100%;
        }

        input:not([type="checkbox"]):not([type="radio"]):focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        input:not([type="checkbox"]):not([type="radio"])::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }

        input[type="checkbox"],
        input[type="radio"] {
            width: auto;
            padding: 0;
            margin: 0;
        }

        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        /* ===== Tabs ===== */
        .tabs {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 20px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.12s ease, border-color 0.12s ease, background-color 0.12s ease;
            min-height: 44px;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent);
        }

        .tab[aria-selected="true"] {
            color: var(--text-primary);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .memory-card,
        .lore-entry,
        .provider-item {
            content-visibility: auto;
            contain-intrinsic-size: auto 180px;
        }

        /* ===== Empty State ===== */
        .empty {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        /* ===== Toast Notifications ===== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 500;
            box-shadow: 0 4px 12px var(--shadow-color);
            animation: toastIn 0.3s ease;
            max-width: 360px;
            pointer-events: auto;
        }

        .toast.hiding {
            animation: toastOut 0.3s ease forwards;
        }

        .toast.success {
            background: var(--success);
            color: var(--on-accent);
        }

        .toast.error {
            background: var(--danger);
            color: var(--on-accent);
        }

        .toast.warning {
            background: var(--warning);
            color: var(--on-warning);
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes toastOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* ===== Modal ===== */
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--scrim);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: modalFadeIn 0.2s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .confirm-modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 48px var(--shadow-color);
        }

        .confirm-modal h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .confirm-modal p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .confirm-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* ===== Live Indicator ===== */
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--success);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) {
            .container {
                padding: 24px;
            }

            nav {
                padding: 0 24px;
            }
        }

        @media (max-width: 768px) {
            nav {
                flex-wrap: wrap;
                height: auto;
                padding: 16px;
                gap: 12px;
            }

            .nav-brand {
                width: 100%;
                justify-content: center;
            }

            .nav-links {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .nav-right {
                width: 100%;
                justify-content: center;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 16px;
            }

            th, td {
                padding: 12px 16px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }

            .card-body, .card:not(:has(.card-header)):not(:has(.card-body)) {
                padding: 16px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 0.8125rem;
                min-height: 44px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .toast-container {
                left: 12px;
                right: 12px;
                bottom: 12px;
            }

            .toast {
                max-width: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
    <script>
        // Theme initialization (runs before page renders to prevent flash)
        (function() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body>
    <a href="#main-content" class="btn btn-primary skip-link">Skip to content</a>
    <div class="toast-container" id="toast-container"></div>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <nav aria-label="Primary navigation">
        <div class="nav-brand">
            <img src="/static/dashboard-brand.webp" alt="Discord Pals" class="nav-brand-icon" width="32" height="32" decoding="async">
            <a href="https://github.com/TheLonelyDevil9/discord-pals" target="_blank" rel="noopener" class="nav-brand-text">Discord Pals</a>
            <span class="nav-version">v{{ version }}</span>
            <img alt="Discord Pals Banner" class="nav-brand-preview" data-src="/static/dashboard-banner-preview.webp" width="400" height="400" decoding="async">
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path=='/' %}active{% endif %}" {% if request.path=='/' %}aria-current="page"{% endif %}>Dashboard</a>
            <a href="/characters" class="nav-link {% if '/characters' in request.path or '/preview' in request.path or '/prompts' in request.path %}active{% endif %}" {% if '/characters' in request.path or '/preview' in request.path or '/prompts' in request.path %}aria-current="page"{% endif %}>Characters</a>
            <a href="/memories" class="nav-link {% if request.path=='/memories' %}active{% endif %}" {% if request.path=='/memories' %}aria-current="page"{% endif %}>Memories</a>
            <a href="/reminders" class="nav-link {% if request.path=='/reminders' %}active{% endif %}" {% if request.path=='/reminders' %}aria-current="page"{% endif %}>Reminders</a>
            <a href="/channels" class="nav-link {% if request.path=='/channels' %}active{% endif %}" {% if request.path=='/channels' %}aria-current="page"{% endif %}>Channels</a>
            <a href="/config" class="nav-link {% if request.path=='/config' or request.path=='/settings' %}active{% endif %}" {% if request.path=='/config' or request.path=='/settings' %}aria-current="page"{% endif %}>Config</a>
            <a href="/logs" class="nav-link {% if request.path=='/logs' or request.path=='/stats' or request.path=='/context' %}active{% endif %}" {% if request.path=='/logs' or request.path=='/stats' or request.path=='/context' %}aria-current="page"{% endif %}>Logs</a>
        </div>
        <div class="nav-right">
            <a href="/#update-bot-control" id="nav-update-status" class="nav-update-status hidden" aria-live="polite">
                <span class="nav-update-dot" aria-hidden="true"></span>
                <span id="nav-update-label">Update available</span>
            </a>
            {% if is_logged_in %}
            <span class="nav-user">admin</span>
            <a href="/logout" class="nav-link">Logout</a>
            {% endif %}
            <button type="button" class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
                <span id="theme-icon" aria-hidden="true">🌙</span>
            </button>
        </div>
    </nav>
    <main class="container" id="main-content" tabindex="-1">{% block content %}{% endblock %}</main>
    <script>
        function showToast(msg, type) {
            type = type || 'success';
            var c = document.getElementById('toast-container');
            var t = document.createElement('div');
            t.className = 'toast ' + type;
            t.setAttribute('role', type === 'error' ? 'alert' : 'status');
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(function() {
                t.classList.add('hiding');
                setTimeout(function() { t.remove(); }, 300);
            }, 3000);
        }

        function showConfirm(title, msg, cb, options) {
            options = options || {};
            var confirmText = options.confirmText || 'Delete';
            var confirmClass = options.confirmClass || 'btn-danger';
            var onCancel = typeof options.onCancel === 'function' ? options.onCancel : function() {};
            var previousFocus = document.activeElement;
            var m = document.createElement('div');
            m.className = 'confirm-modal';
            m.setAttribute('role', 'dialog');
            m.setAttribute('aria-modal', 'true');
            m.setAttribute('aria-labelledby', 'confirm-title');
            m.setAttribute('aria-describedby', 'confirm-message');
            var content = document.createElement('div');
            content.className = 'confirm-modal-content';
            var h3 = document.createElement('h3');
            h3.id = 'confirm-title';
            h3.textContent = title;
            var p = document.createElement('p');
            p.id = 'confirm-message';
            p.textContent = msg;
            var buttons = document.createElement('div');
            buttons.className = 'confirm-modal-buttons';
            var cancelBtn = document.createElement('button');
            cancelBtn.className = 'btn btn-secondary';
            cancelBtn.textContent = 'Cancel';
            var confirmBtn = document.createElement('button');
            confirmBtn.className = 'btn ' + confirmClass;
            confirmBtn.textContent = confirmText;
            buttons.appendChild(cancelBtn);
            buttons.appendChild(confirmBtn);
            content.appendChild(h3);
            content.appendChild(p);
            content.appendChild(buttons);
            m.appendChild(content);
            document.body.appendChild(m);
            cancelBtn.focus();

            function close(cancelled) {
                m.remove();
                if (previousFocus && typeof previousFocus.focus === 'function') {
                    previousFocus.focus();
                }
                if (cancelled) onCancel();
            }

            cancelBtn.onclick = function() { close(true); };
            confirmBtn.onclick = function() { close(false); cb(); };
            m.onclick = function(e) { if (e.target === m) close(true); };
            document.addEventListener('keydown', function handler(e) {
                if (!document.body.contains(m)) {
                    document.removeEventListener('keydown', handler);
                    return;
                }
                if (e.key === 'Escape') {
                    close(true);
                    document.removeEventListener('keydown', handler);
                }
                if (e.key === 'Tab') {
                    var focusable = Array.from(m.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'))
                        .filter(function(el) { return !el.disabled && el.offsetParent !== null; });
                    if (!focusable.length) return;
                    var first = focusable[0];
                    var last = focusable[focusable.length - 1];
                    if (e.shiftKey && document.activeElement === first) {
                        e.preventDefault();
                        last.focus();
                    } else if (!e.shiftKey && document.activeElement === last) {
                        e.preventDefault();
                        first.focus();
                    }
                }
            });
        }

        function confirmAction(title, msg, options) {
            return new Promise(function(resolve) {
                var settled = false;
                function settle(value) {
                    if (settled) return;
                    settled = true;
                    resolve(value);
                }
                var mergedOptions = Object.assign({}, options || {}, {
                    onCancel: function() {
                        if (options && typeof options.onCancel === 'function') {
                            options.onCancel();
                        }
                        settle(false);
                    }
                });
                showConfirm(title, msg, function() { settle(true); }, mergedOptions);
                var modal = document.querySelector('.confirm-modal:last-of-type');
                if (!modal) {
                    settle(false);
                }
            });
        }

        // Shared utility: Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (text == null) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Shared utility: API request helper with CSRF token
        async function apiRequest(url, method, data) {
            method = method || 'GET';
            var options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': document.querySelector('meta[name="csrf-token"]')?.content || ''
                }
            };
            if (data && method !== 'GET') {
                options.body = JSON.stringify(data);
            }
            var response = await fetch(url, options);
            if (!response.ok) {
                var errorData = await response.json().catch(function() { return {}; });
                throw new Error(errorData.message || 'Request failed: ' + response.status);
            }
            return response.json();
        }

        // Shared utility: Debounce function for search inputs
        function debounce(fn, delay) {
            var timeout;
            return function() {
                var args = arguments;
                var context = this;
                clearTimeout(timeout);
                timeout = setTimeout(function() { fn.apply(context, args); }, delay);
            };
        }

        // Shared utility: Disable button during async operation
        async function withButtonLoading(btn, asyncFn) {
            var originalText = btn.textContent;
            btn.disabled = true;
            btn.setAttribute('aria-busy', 'true');
            btn.textContent = 'Loading';
            try {
                return await asyncFn();
            } finally {
                btn.disabled = false;
                btn.removeAttribute('aria-busy');
                btn.textContent = originalText;
            }
        }

        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            var icon = document.getElementById('theme-icon');
            if (icon) {
                icon.textContent = theme === 'dark' ? '🌙' : '☀️';
            }
        }

        // Update icon on load
        updateThemeIcon(document.documentElement.getAttribute('data-theme'));

        function hideGlobalUpdateIndicator() {
            var indicator = document.getElementById('nav-update-status');
            if (!indicator) return;
            indicator.classList.add('hidden');
            indicator.classList.remove('update-available', 'restart-required');
            indicator.removeAttribute('title');
        }

        function renderGlobalUpdateIndicator(data) {
            var indicator = document.getElementById('nav-update-status');
            var label = document.getElementById('nav-update-label');
            if (!indicator || !label || !data || data.status !== 'ok') return;

            var version = data.latest_version || data.file_version || data.github_version;
            indicator.classList.remove('update-available', 'restart-required');

            if (data.restart_required && version) {
                label.textContent = 'Restart for v' + version;
                indicator.href = '/#restart-bot-control';
                indicator.title = 'Restart Discord Pals to run v' + version;
                indicator.classList.add('restart-required');
                indicator.classList.remove('hidden');
                return;
            }

            if (data.update_available && version) {
                label.textContent = 'Update to v' + version;
                indicator.href = '/#update-bot-control';
                indicator.title = 'A Discord Pals update is available on GitHub';
                indicator.classList.add('update-available');
                indicator.classList.remove('hidden');
                return;
            }

            hideGlobalUpdateIndicator();
        }

        async function checkGlobalUpdateStatus(forceRefresh) {
            if (!forceRefresh && document.hidden) {
                return window.dashboardVersionState || null;
            }
            try {
                var response = await fetch('/api/version', { headers: { 'Accept': 'application/json' } });
                if (!response.ok) throw new Error('Version check failed: ' + response.status);
                var data = await response.json();
                window.dashboardVersionState = data;
                renderGlobalUpdateIndicator(data);
                document.dispatchEvent(new CustomEvent('dashboard-version-state', { detail: data }));
                return data;
            } catch (e) {
                if (!window.dashboardVersionState) {
                    hideGlobalUpdateIndicator();
                }
                return window.dashboardVersionState || null;
            }
        }

        window.renderGlobalUpdateIndicator = renderGlobalUpdateIndicator;
        window.hideGlobalUpdateIndicator = hideGlobalUpdateIndicator;
        window.checkGlobalUpdateStatus = checkGlobalUpdateStatus;

        (function initGlobalUpdateStatus() {
            var updatePollInterval = null;

            function startPolling() {
                if (!updatePollInterval) {
                    updatePollInterval = setInterval(function() { checkGlobalUpdateStatus(false); }, 30 * 60 * 1000);
                }
            }

            function stopPolling() {
                if (updatePollInterval) {
                    clearInterval(updatePollInterval);
                    updatePollInterval = null;
                }
            }

            checkGlobalUpdateStatus(true);
            startPolling();
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    stopPolling();
                } else {
                    checkGlobalUpdateStatus(true);
                    startPolling();
                }
            });
        })();

        (function initBrandPreview() {
            var brand = document.querySelector('.nav-brand');
            var preview = document.querySelector('.nav-brand-preview');
            if (!brand || !preview) return;

            function loadPreview() {
                if (!preview.getAttribute('src')) {
                    preview.setAttribute('src', preview.getAttribute('data-src'));
                }
            }

            brand.addEventListener('pointerenter', loadPreview, { once: true });
            brand.addEventListener('focusin', loadPreview, { once: true });
        })();
    </script>
</body>

</html>
