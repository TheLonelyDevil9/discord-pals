<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Discord Pals</title>
    <meta name="color-scheme" content="dark light">
    <link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <style>
        /* Dark Theme (Default) */
        :root, [data-theme="dark"] {
            color-scheme: dark;
            --bg-primary: oklch(17% 0.009 270);
            --bg-secondary: oklch(22% 0.011 270);
            --bg-tertiary: oklch(28% 0.012 270);
            --border: oklch(42% 0.014 270);
            --border-subtle: oklch(31% 0.012 270);
            --text-primary: oklch(96% 0.006 270);
            --text-secondary: oklch(73% 0.012 270);
            --text-muted: oklch(61% 0.011 270);
            --accent: oklch(62% 0.18 255);
            --on-accent: oklch(98% 0.006 260);
            --danger: oklch(66% 0.2 25);
            --danger-muted: color-mix(in oklch, var(--danger) 14%, transparent);
        }

        /* Light Theme */
        [data-theme="light"] {
            color-scheme: light;
            --bg-primary: oklch(98% 0.006 270);
            --bg-secondary: oklch(95% 0.008 270);
            --bg-tertiary: oklch(91% 0.01 270);
            --border: oklch(80% 0.012 270);
            --border-subtle: oklch(88% 0.01 270);
            --text-primary: oklch(20% 0.012 270);
            --text-secondary: oklch(39% 0.014 270);
            --text-muted: oklch(51% 0.013 270);
            --accent: oklch(55% 0.18 255);
            --on-accent: oklch(98% 0.006 260);
            --danger: oklch(56% 0.2 25);
            --danger-muted: color-mix(in oklch, var(--danger) 12%, transparent);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            transition: border-color 0.15s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 10px 16px;
            background: var(--accent);
            color: var(--on-accent);
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .error {
            background: var(--danger-muted);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.15s ease, border-color 0.15s ease, background-color 0.15s ease;
            font-size: 1.125rem;
        }

        .theme-toggle:hover {
            color: var(--text-primary);
            border-color: var(--border);
        }
    </style>
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">🤖</div>
                <h1>Discord Pals</h1>
                <p>Sign in to your dashboard</p>
            </div>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Sign in</button>
            </form>
        </div>
    </div>

    <button type="button" class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <span id="theme-icon">🌙</span>
    </button>

    <script>
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-icon').textContent = next === 'dark' ? '🌙' : '☀️';
        }
        document.getElementById('theme-icon').textContent =
            document.documentElement.getAttribute('data-theme') === 'dark' ? '🌙' : '☀️';
    </script>
</body>
</html>
